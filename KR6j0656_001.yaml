body:
  text: 多地耶他闍藍婆摩訶闍藍婆阿奴呵闍藍婆娑囉闍藍婆郁伽闍藍婆夜叉毗梨闍藍婆那伽闍藍婆優羅伽毗梨闍藍婆阿薩帝鼻梨闍藍婆阿輸婆比利闍藍婆摩嗟比利闍藍婆曼廚迦比梨闍藍婆佉目羅比梨闍藍婆崩起比梨闍藍婆阿摩比梨闍藍婆蘇脂目佉闍藍婆婆摩囉婆摩囉闍藍婆摩囉比闍迦荼鉢多囉布疏波頗藍婆素叉梨牛婆素達摩耶若比利使致搔醯藍婆伽苫步上聲羅婆窮去聲窮婆羅窮頻頭窮婆羅闍比娑婆呵是陀羅尼句若為他人及自己身稱其名號為誦此陀羅尼一切怖畏一切殃禍悉皆消滅水風摩尼宮陀羅尼輪多地他蘇婆羅婆羅底那那婆羅底制平聲沙吒婆羅底阿那婆羅底奢婆多曷囉婆羅底奢囉拏婆羅底鳩牟尼婆羅底珊支囉婆羅底制平聲陀娑羅婆羅底娑羅婆羅底娑羅鉢利訶利娑羅婆羅多上聲鉢利訶利那那鉢利訶利婢毗迦鉢利訶利耶若鉢利訶利蘇婆羅鉢利訶利頻頭鉢利訶利闍羅鉢利訶利憩多羅鉢利訶利特叉鉢利訶利珊尼摩鉢利訶利蘇婆婆鉢提犁劬摩耶末陀索溪阿那耶波盧誓迷羅跋迷阿羅那求師佉羅毗闍那羅延拏婢諶林憂羅伽阿尼彌篩宮闍囉婆胡迷訶闍債羯摩毗羅犁舍羅摩拏娑離犁佉曷羅伽奢迷阿斯那迷阿耆尼鉢底利能求耽鼻犁婆耶遮婆留尼犍咃債犁釋迦囉是若移阿那鵄提帝利那耶娜尼利帝利耶頭婆佛阿訶地子瑟癡帝莎婆訶使此國天子及其眷屬悉皆吉祥莎呵那羅延拏尼羅移莎呵斫迦囉吠多迦羅迷莎婆呵此陀羅尼力能除一切鬪諍一切毒害夜叉羅剎修羅惡龍乃至人非人等及諸禽獸一切非時風熱寒冷災雲旱潦等過悉皆消滅此陀羅尼能令五穀悉皆成好令諸衆生增益壽命增長身色資生安樂無患名譽持戒多聞布施慈悲智慧方便三昧陀羅尼地觀樂出世化衆生入大乘勝願地地轉入觀察陰界慚愧攝功德莊嚴佛土六波羅蜜行一切十方諸佛常所護念值過佛一切菩薩善友遊戲神足壞一切煩惱不令增長神通渡於彼岸不令退減一切善法乃至無上涅槃磨力大陀羅尼多地他那鼻摩訶那鼻初何囉那阿鼻具那去聲僧輸沙拏那鼻何囉闍佉阿婆羅牟尼多嚧那胡嚧醯那他上聲鉢帝利闍婆徒迷魔囉娑帝帝弭羅鉢帝利蹇荼涅利何隸斫初婆嘶佉拏上聲毗迷踦上聲帝都裔莎波呵鴦求囉踦莎波呵布疏簸耶迷莎波呵跛羅債莎波呵薩智耶都裔莎波呵賒梨囉那婆迦羅摩毗沙莎波呵此陀羅尼句擁護國王莎波呵此陀羅尼力令一切衆果報所須及以地味悉無減損無能毀奪地之精氣無放毒氣不壞美味能生五穀藥草不奪其精氣無有毒氣不乾枯不澀惡不令不熟寒熱不傷食用無障食已無毒略抄須彌藏龍仙菩薩說呪曰多地耶他薩耽婆步闍毗梨荼步闍輸拒盧梨荼步闍迷盧闍婆伽除婆步闍炎于釰切炎阿泥婆步闍蘇摩羅阿跋多步闍債菩步闍莎波呵此陀羅尼呪句擁護某甲莎波呵若有衆生為諸毒龍之所惱亂當稱我名并誦此陀羅尼我滅此龍貪瞋慢妬毒惡之心不能令彼作非時風雨寒熱旱潦災雹惡此善住龍王為一切象龍主此難陀龍王婆難陀龍王為一切蛇龍主此阿耨達龍王為一切馬龍主此婆樓那龍主為一切魚龍王此摩那蘇婆帝龍王為一切蝦蟇龍主善住龍王說呪曰多地耶他那伽嚪步竹篩那伽泥迷那伽陀囉輸伽囉輸伽囉闍邏輸伽囉阿鼻摩祇娑波呵娑囉目企迦羅帝步竹篩耶婆薩耽帝闍耶婆頗頴毗目賖羯隸莎波呵如是陀羅尼句擁護某甲令一切怖畏一切災害悉令消滅莎波呵難陀龍王婆難陀陀龍王說呪曰多地他婆囉拏輸迷鳩牛婆頭囉踦婆嚧拏懼阿迦羅踦翅賖泥毗摩何囉伽踦鳩拏鼻阿羅耆阿多沙隸那邪那耽迦羅鳩世衰鴦懼波羅製乾陀何羅婆斯莎婆呵此陀羅尼句擁護某甲莎婆呵阿那婆達多龍王說呪曰多地他那摩比梨世那婆耶摩比梨世阿奴差那婆躬牛闍鼻踦佉伽裴佉鉢囉都嚧安豸徒賣切賀邪斯隸那囉邪拏瞿迷比那悉𨲙隸阿賖迦囉迷阿初是泥移篩牟尼薩莎波呵此陀羅尼擁護某甲令無怖畏殃禍莎波呵婆樓那龍王說呪曰多地他兮摩迷簸羅綺拏瞿泥多拏頻度帝利泥婆羅叉達利迷伽僧俱迷比邪牟芩翅世徒嚧謨提摩移上多那鋸斯折摩奚雞遮羅何羅鴦耆那茶達坻犍荼加都隸莎波呵此陀羅尼句擁護某甲莎波呵摩那蘇婆帝龍王說呪曰多地邪他佛陀闍邪婆羅差阿摩尼迷菩哆娑離梨阿婆未提鉢囉帝邪尼利阿婆尼邏迷企羅輸篩那蘇都卑鉢梨卑娑什娑犍陀婆梨波囉喃訖利移莎波呵此陀羅尼擁護某甲莎波呵地藏菩薩欲說幢杖大陀羅尼門一經耳者所有耳病悉得除愈亦除一切貪瞋癡等煩惱諸病設不全滅能令輕薄乃至於佛法中得清淨信乃至後世資生豐足衆人愛樂即說呪曰多地他崩伽婆末帝阿盧波摩帝器多羅浮革波那蹇地句那磨企隸磨蹉奴隸橋何囉那地那叉跋迷槃陀阿囉輸迷捭伽羅耆梨迷盧醯多何羅濘伽羅蘇婆伽那兮梨泥安陀柘漩梨迦囉浮逝雞舍盧醯三摩提頭婆利莎波呵此陀羅尼句擁護某甲令離怖畏莎波呵無盡意菩薩說一切如來語言者聲發幢蓋摩尼願眼大陀羅尼有大威德有大威勢有大威力滿多聞藏滿智慧藏諸佛聲聞之所成就若有如來所盡形壽安住淨戒安住優婆塞戒若住沙彌戒若住具足戒若器非器若於此幢蓋摩尼願眼大陀羅尼能受持讀誦七日七日慧觀方便恆常觀察於五受陰數數誦此大陀羅尼於七日七夜能誦滿百千遍便得聞持隨聞能受得無量辨才能令剎利婆羅門毗舍首陀及一切衆生生敬信心又復能令豐足資財趣向天道常得親近生諸佛即說呪曰多地他帝利拏僧是若翅鼻帝利拏頻迦㘕陀差蒱婆蘇閉遮摩羅諶阿婆羅差阿差邪盧臂阿遲邪兜摩帝彌利尸利婆毗莎婆利鴦渠闍陀是禰闍闍囉奴迷阿那摩輸地彌梨佉其利差尼羅婆嚌未伽婆差袍婆莎婆利呵佛梨帝蘇步莎婆囉佉逝蘇謨帝謨泥莎波呵此陀羅尼擁護某甲莎波呵文殊師利菩薩欲令此四天下所有樹木華果五穀藥味芽莖枝葉及依地衆生資須之具令其豐足為擁護故說大陀羅尼名能懼尸利子利奴此四天下中希有未有增長一切種子芽莖枝葉華果藥味潤澤甘味悉皆豐饒令一切衆生能作信戒多聞布施智慧慈悲方便長養一切助菩提分法即於佛前而說呪曰多地他阿曼禰邪居閉伽婆叉毗誓渠盧遮盧迷尸利邪叉居蘇迷那婆鋸聞地徒賣切何囉闍跋迷車吒婆波摩嚌畢素狠祇阿佛囉素隸何娑伽闍差盧摩浮闍差鉗毗囉婆素迷阿奴摩邪薩利鉢羅賒都裔莎波呵此陀羅尼句擁護某甲莎波呵以此陀羅尼書高幢上以大音聲而讚誦之復以此陀羅尼呪阿那果汁一千遍用散樹木田苗五穀若以此呪呪諸螺鼓而吹繫之隨其音聲所到之處所有華果五穀藥味依地生者一切災害無能毀壞無能乾枯云云觀世音菩薩說船華功德大陀羅尼曰多地邪他藍步莎婆利迦莎邪跋迷三稱移婆竭隸陀婆何楞伽闍隸募力差素何叉莎婆梨蘇呵風祇阿婆路迦陀隸悉陀呵毗呵毗婆差馳呵那頻婆兮梨阿毗扇陀遏搔婆遮羅阿婆囉何羅斯婆羅呵初地利迦何囉都裔三摩提羯泥婆羅闍尼帝利摩訶浮多究細阿囉拏尼隸婆羅呵賒迷尼羅居蘇迷莎波呵此陀羅尼句擁護國主莎波呵若諸衆生聞此陀羅尼音一經耳者乃至微細蚊蚋蟲等濁惡之心皆悉消滅於善法中得安住心況復人等得聞此陀羅尼若有人欲求雨者當至泉原龍居之處誦此陀羅尼一日誦一千八遍日日如是乃至七日復以種種好華名香百味飲食散龍池中唯除酒肉五辛不淨之食從月七日至十四日於十五日旦當以胡椒末和豍麻油呪一千八遍塗白氎上棄龍泉中能令此龍於彼人所生大欣喜便澍大雨世尊即說偈言所有諸苦生皆由於飲食若離於飲食諸苦則不生觀世音菩薩說呪曰多地他牟尼尸婆牟尼那佉牟尼波羅牟尼莎利薩𧯞婆於娑差帝剎多囉波羅那膩羅婆邪婆薩婆毗闍邪婆悉利梨莎波呵此陀羅尼句擁護某甲莎波呵音釋𨲙弟髮也𧯞丁豆切䠋髀同
